name: 🚀 Publish Package

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  # Gate the release on the full live-engine matrix. The PR `test` job's unit+SQLite
  # run doesn't fire on tag pushes, so the publish pipeline runs the engines itself —
  # one isolated container per engine; any failure blocks the publish job.
  integration:
    name: 🐳 Integration (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        engine: [postgres, mysql, mssql, oracle]

    steps:
      - name: 🗂️  Checkout repository
        uses: actions/checkout@v7

      - name: ⚙️  Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: 🧩  Install dependencies
        run: npm ci

      - name: 🐳  Start ${{ matrix.engine }}
        run: docker compose --profile ${{ matrix.engine }} up -d --wait

      - name: 🧪  Run ${{ matrix.engine }} integration tests
        run: npm run test:${{ matrix.engine }}

      - name: 🧹  Tear down
        if: always()
        run: docker compose --profile ${{ matrix.engine }} down -v

  publish:
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: 🗂️  Checkout repository
        uses: actions/checkout@v7

      # Guard against accidental/experiment tags: the tag (optionally v-prefixed)
      # must match package.json's version or we refuse to publish.
      - name: 🔖  Verify tag matches package version
        run: |
          node -e '
            const tag = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            const version = require("./package.json").version;
            if (tag !== version) {
              console.error(`Tag "${process.env.GITHUB_REF_NAME}" does not match package.json version "${version}" — refusing to publish.`);
              process.exit(1);
            }
          '

      - name: ⚙️  Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: 🧩  Install dependencies
        run: npm ci

      - name: 🛠️  Build package
        run: npm run build --if-present

      - name: 🧪  Run Unit + SQLite Tests
        run: npm test

      - name: 📦  Publish Package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
