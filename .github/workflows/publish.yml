name: 🚀 Publish Package

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️  Checkout repository
        uses: actions/checkout@v6

      # Guard against accidental/experiment tags: the tag (optionally v-prefixed)
      # must match package.json's version or we refuse to publish.
      - name: 🔖  Verify tag matches package version
        run: |
          node -e '
            const tag = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            const version = require("./package.json").version;
            if (tag !== version) {
              console.error(`Tag "${process.env.GITHUB_REF_NAME}" does not match package.json version "${version}" — refusing to publish.`);
              process.exit(1);
            }
          '

      - name: ⚙️  Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: 🧩  Install dependencies
        run: npm ci

      - name: 🛠️  Build package
        run: npm run build --if-present

      - name: 🧪  Run Unit + SQLite Tests
        run: npm test

      - name: 📦  Publish Package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
